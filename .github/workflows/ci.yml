name: CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint (ESLint)
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests (Vitest)
        run: npm run test

      - name: Build
        run: npm run build
        env:
          SESSION_SECRET: ci-only-secret-not-used-at-runtime
